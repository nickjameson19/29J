<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დიო - კონფიგურატორი</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        .ui-header { background: #1a1a1a; padding: 10px; border-bottom: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.6); position: relative; z-index: 10; }
        .panel { background: #222; border-radius: 10px; padding: 8px; margin-bottom: 5px; border: 1px solid #333; }
        .type-btn { background: #333; color: white; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; font-size: 13px; cursor: pointer; margin: 2px; }
        .type-btn.active { background: #00b4d8; border-color: #00e6ff; font-weight: bold; }
        .upload-btn { background: #2a2a2a; color: #00e6ff; padding: 8px 15px; border-radius: 6px; display: inline-block; cursor: pointer; font-size: 14px; border: 1px solid #444; }
        .color-group { margin-top: 5px; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .color-label { font-size: 11px; color: #aaa; width: 50px; text-align: right; }
        .color-btn { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; }
        canvas { background: #000; display: block; margin: 0 auto; touch-action: none; }
        #imgLoader { display: none; }
    </style>
</head>
<body>

<div class="ui-header">
    <div class="panel">
        <label for="imgLoader" class="upload-btn">📸 ფოტოს გადაღება / ატვირთვა</label>
        <input type="file" id="imgLoader" accept="image/*" capture="environment">
    </div>

    <div class="panel">
        <button class="type-btn active" onclick="setType('horizontal')">Horizontal</button>
        <button class="type-btn" onclick="setType('vertical')">Vertical</button>
        <button class="type-btn" onclick="setType('zebra')">Zebra</button>
    </div>

    <div id="color-controls" class="panel">
        <div class="color-group">
            <span id="label1" class="color-label">ფერი 1:</span>
            <div class="color-btn" style="background: #ffffff" onclick="changeColor(1, '#ffffff')"></div>
            <div class="color-btn" style="background: #f4e7d4" onclick="changeColor(1, '#f4e7d4')"></div>
            <div class="color-btn" style="background: #d9c09a" onclick="changeColor(1, '#d9c09a')"></div>
            <div class="color-btn" style="background: #8b5e3c" onclick="changeColor(1, '#8b5e3c')"></div>
            <div class="color-btn" style="background: #333333" onclick="changeColor(1, '#333333')"></div>
        </div>
        <div id="group2" class="color-group" style="display:none;">
            <span class="color-label">ფერი 2:</span>
            <div class="color-btn" style="background: #e0e0e0" onclick="changeColor(2, '#e0e0e0')"></div>
            <div class="color-btn" style="background: #a0a0a0" onclick="changeColor(2, '#a0a0a0')"></div>
            <div class="color-btn" style="background: #606060" onclick="changeColor(2, '#606060')"></div>
            <div class="color-btn" style="background: #1a1a1a" onclick="changeColor(2, '#1a1a1a')"></div>
        </div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let baseImg = new Image(), overlayImg = new Image();
    let pts = [{x: 50, y: 50}, {x: 250, y: 50}, {x: 250, y: 250}, {x: 50, y: 250}];
    let dragging = -1, c1 = '#ffffff', c2 = '#a0a0a0', type = 'horizontal';

    // SVG შაბლონები პირდაპირ კოდში
    const svgs = {
        horizontal: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="COLOR1"/><path d="M0 10h100M0 20h100M0 30h100M0 40h100M0 50h100M0 60h100M0 70h100M0 80h100M0 90h100" stroke="black" stroke-width="0.5" opacity="0.3"/></svg>`,
        vertical: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="COLOR1"/><path d="M10 0v100M20 0v100M30 0v100M40 0v100M50 0v100M60 0v100M70 0v100M80 0v100M90 0v100" stroke="black" stroke-width="0.5" opacity="0.3"/></svg>`,
        zebra: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="10" fill="COLOR1"/><rect y="10" width="100" height="10" fill="COLOR2"/><rect y="20" width="100" height="10" fill="COLOR1"/><rect y="30" width="100" height="10" fill="COLOR2"/><rect y="40" width="100" height="10" fill="COLOR1"/><rect y="50" width="100" height="10" fill="COLOR2"/><rect y="60" width="100" height="10" fill="COLOR1"/><rect y="70" width="100" height="10" fill="COLOR2"/><rect y="80" width="100" height="10" fill="COLOR1"/><rect y="90" width="100" height="10" fill="COLOR2"/></svg>`
    };

    function update() {
        let s = svgs[type].replace(/COLOR1/g, c1).replace(/COLOR2/g, c2);
        let url = "data:image/svg+xml;base64," + btoa(s);
        overlayImg.onload = draw;
        overlayImg.src = url;
    }

    function setType(t) {
        type = t;
        document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(t)));
        document.getElementById('group2').style.display = t === 'zebra' ? 'flex' : 'none';
        update();
    }

    function changeColor(g, c) { if(g===1) c1=c; else c2=c; update(); }

    document.getElementById('imgLoader').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => {
            baseImg.onload = () => {
                const headerH = document.querySelector('.ui-header').offsetHeight;
                const ratio = Math.min(window.innerWidth / baseImg.width, (window.innerHeight - headerH) / baseImg.height);
                canvas.width = baseImg.width * ratio; canvas.height = baseImg.height * ratio;
                const w = canvas.width, h = canvas.height;
                pts = [{x:w*0.2,y:h*0.2},{x:w*0.8,y:h*0.2},{x:w*0.8,y:h*0.8},{x:w*0.2,y:h*0.8}];
                draw();
            }; baseImg.src = ev.target.result;
        }; r.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if (baseImg.src) ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
        if (overlayImg.complete) {
            ctx.save();
            let minX = Math.min(pts[0].x, pts[3].x), minY = Math.min(pts[0].y, pts[1].y);
            let maxX = Math.max(pts[1].x, pts[2].x), maxY = Math.max(pts[2].y, pts[3].y);
            ctx.globalAlpha = 0.85;
            ctx.drawImage(overlayImg, minX, minY, maxX-minX, maxY-minY);
            ctx.restore();
        }
        pts.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 22, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,0,0,0.8)"; ctx.fill();
            ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
        });
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    canvas.addEventListener('mousedown', e => {
        const p = getPos(e);
        pts.forEach((pt, i) => { if(Math.hypot(pt.x-p.x, pt.y-p.y) < 45) dragging = i; });
        if(dragging!==-1) e.preventDefault();
    });
    canvas.addEventListener('touchstart', e => {
        const p = getPos(e);
        pts.forEach((pt, i) => { if(Math.hypot(pt.x-p.x, pt.y-p.y) < 45) dragging = i; });
        if(dragging!==-1) e.preventDefault();
    }, {passive: false});

    window.addEventListener('mousemove', e => {
        if(dragging===-1) return;
        const p = getPos(e); pts[dragging] = p; draw(); e.preventDefault();
    });
    window.addEventListener('touchmove', e => {
        if(dragging===-1) return;
        const p = getPos(e); pts[dragging] = p; draw(); e.preventDefault();
    }, {passive: false});

    window.addEventListener('mouseup', () => dragging = -1);
    window.addEventListener('touchend', () => dragging = -1);

    canvas.width = window.innerWidth; canvas.height = 400;
    update();
</script>
</body>
</html>
