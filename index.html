<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დიო - AI კონსულტანტი</title>
    <style>
        :root { --accent: #38bdf8; --bg: #0f172a; --panel: rgba(30, 41, 59, 0.9); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--panel); backdrop-filter: blur(10px); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .main-content { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        
        /* ვიზუალიზაცია */
        .canvas-area { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 15px; }
        canvas { max-width: 95%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }

        /* ჩატი */
        .chat-panel { flex: 1; background: #1e293b; border-radius: 15px; display: flex; flex-direction: column; border: 1px solid var(--accent); overflow: hidden; }
        .chat-header { background: var(--accent); color: #000; padding: 10px; font-weight: 800; font-size: 13px; text-transform: uppercase; text-align: center; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 13.5px; scroll-behavior: smooth; }
        
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.5; position: relative; }
        .msg.ai { background: rgba(56, 189, 248, 0.15); border-left: 4px solid var(--accent); align-self: flex-start; color: #f1f5f9; }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; font-weight: 600; }

        .chat-input-area { padding: 12px; background: rgba(0,0,0,0.4); display: flex; gap: 8px; }
        .chat-input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; outline: none; transition: 0.3s; }
        .chat-input:focus { border-color: var(--accent); }
        .send-btn { background: var(--accent); border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .send-btn:active { transform: scale(0.9); }

        @media (max-width: 768px) { .main-content { flex-direction: column; } .chat-panel { height: 400px; } }
        .upload-label { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; color:var(--accent); font-size: 16px;">DIO - ჭკვიანი ასისტენტი</h2>
        <div style="margin-top:10px; display:flex; gap:10px; justify-content:center; align-items:center;">
            <label for="imgLoader" class="upload-label">📸 ატვირთე ფოტო</label>
            <input type="file" id="imgLoader" accept="image/*" style="display:none;">
            <span id="productName" style="font-size: 12px; color: #888;">შერჩეულია: ჰორიზონტალური</span>
        </div>
    </div>

    <div class="main-content">
        <div class="canvas-area">
            <canvas id="canvas"></canvas>
        </div>

        <div class="chat-panel">
            <div class="chat-header">🤖 DIO AI CONSULTANT</div>
            <div class="chat-messages" id="chatMsgs">
                <div class="msg ai">გამარჯობა! მე ვარ დიოს ხელოვნური ინტელექტი. შემიძლია გაგიწიოთ კონსულტაცია პროდუქციის მოვლაზე, მონტაჟსა და უსაფრთხოებაზე. რა გაინტერესებთ?</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" class="chat-input" placeholder="დაწერეთ კითხვა..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ლოგიკური ცოდნის ბაზა (ბუკლეტების მიხედვით) ---
    const dioKnowledge = [
        {
            keywords: ["მოვლა", "წმენდა", "გასუფთავება", "დასვრა"],
            response: "დიოს პროდუქციის მოვლა მარტივია: უმეტესობა იწმინდება რბილი, მშრალი ან კარგად გაწურული ნოტიო ქსოვილით. მაგალითად, ზებრა და როლეტი მხოლოდ ფრთხილ, მშრალ წმენდას საჭიროებს, ხოლო რომაული ფარდის ქსოვილი შეგიძლიათ მოხსნათ და გარეცხოთ კიდეც."
        },
        {
            keywords: ["ბავშვი", "უსაფრთხოება", "საშიში", "თოკი", "ჯაჭვი"],
            response: "უსაფრთხოება უპირატესობაა! აუცილებლად მოარიდეთ სამართავი ჯაჭვები და თოკები ბავშვებს, რათა თავიდან აიცილოთ უბედური შემთხვევა. დიო რეკომენდაციას უწევს უსაფრთხოების ფიქსატორების გამოყენებას."
        },
        {
            keywords: ["რომაული", "რეცხვა", "მოხსნა"],
            response: "რომაული ფარდა ძალიან პრაქტიკულია: მისი ქსოვილი კარნიზზე სპეციალური წებოვანი ლენტით (ფხრიწით) მაგრდება. ეს საშუალებას გაძლევთ მარტივად მოხსნათ ქსოვილი გასარეცხად ან გასაწმენდად."
        },
        {
            keywords: ["მაგნოლია", "მინაზე", "დამაგრება"],
            response: "მაგნოლია იდეალურია მეტალოპლასტმასის ფანჯრებისთვის. ის მაგრდება უშუალოდ ფანჯრის ჩარჩოზე, მინიმალურ ადგილს იკავებს და ფანჯრის გაღება-გადმოკიდებისას არ ფრიალებს."
        },
        {
            keywords: ["ზებრა", "ზოლები", "ბადე"],
            response: "ზებრა როლეტი საშუალებას გაძლევთ ზუსტად აკონტროლოთ სინათლე. მისი გაწმენდა რეკომენდებულია ძალიან ფრთხილად, მშრალი ქსოვილით. მოერიდეთ ბადისებრი ზოლების დაჭიმვას."
        },
        {
            keywords: ["პულტი", "ელექტრო", "ავტომატური", "მანძილი"],
            response: "ავტომატური მართვისას გამოიყენება სამართავი პულტი, რომლის რადიუსი 20-25 მეტრია. პერიოდულად შეამოწმეთ ელემენტის მდგომარეობა პულტში."
        },
        {
            keywords: ["ვერტიკალური", "ოფისი", "ლამელი"],
            response: "ვერტიკალური ჟალუზი საუკეთესოა დიდი ვიტრაჟებისთვის და ოფისებისთვის. მისი ლამელების მართვა ხდება ჯაჭვით, ხოლო გადაწევა-გადმოწევა - თოკით."
        }
    ];

    // --- ჩატის ჭკვიანი ლოგიკა ---
    function findSmartResponse(input) {
        input = input.toLowerCase();
        let bestMatch = null;
        
        // ვეძებთ ყველაზე შესაბამის პასუხს ქივორდების მიხედვით
        for (let entry of dioKnowledge) {
            for (let word of entry.keywords) {
                if (input.includes(word)) {
                    bestMatch = entry.response;
                    break;
                }
            }
        }

        if (bestMatch) return bestMatch;

        // თუ ვერაფერი იპოვა, აბრუნებს ლოგიკურ ზოგად პასუხს
        if (input.length < 5) return "გთხოვთ, უფრო კონკრეტულად მომწეროთ თქვენი კითხვა.";
        return "საინტერესო კითხვაა. დიოს ბუკლეტების მიხედვით, ჩვენი პროდუქცია უმაღლესი ხარისხისაა. დააზუსტეთ, კონკრეტულად რომელ მოდელზე გსურთ ინფორმაცია (ზებრა, მაგნოლია, როლეტი თუ სხვა)?";
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        addMessage(text, 'user');
        input.value = '';

        // "წერის" იმიტაცია
        setTimeout(() => {
            const response = findSmartResponse(text);
            addMessage(response, 'ai');
        }, 600);
    }

    function addMessage(text, side) {
        const container = document.getElementById('chatMsgs');
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = text;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    // --- ვიზუალიზაცია (შენარჩუნებული) ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let baseImg = new Image();
    
    document.getElementById('imgLoader').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { baseImg.onload = () => { 
            canvas.width = 400; canvas.height = 300; 
            ctx.drawImage(baseImg, 0, 0, 400, 300); 
        }; baseImg.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    canvas.width = 400; canvas.height = 300;
    ctx.fillStyle = "#222"; ctx.fillRect(0,0,400,300);
    ctx.fillStyle = "#555"; ctx.font = "14px sans-serif";
    ctx.fillText("ატვირთეთ ფანჯრის ფოტო", 120, 150);
</script>
</body>
</html>
