<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დიო - სმარტ კონფიგურატორი</title>
    <style>
        :root { --accent: #38bdf8; --bg: #0b0f1a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow-x: hidden; touch-action: none; }
        
        .header { 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(12px); 
            padding: 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            position: sticky; top: 0; z-index: 100; 
        }

        .neon-title { font-size: 20px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin: 0 0 10px 0; letter-spacing: 2px; }
        
        /* კონტროლების პანელი */
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 500px; margin: 0 auto; }
        
        .switch-box { 
            background: rgba(255,255,255,0.05); 
            padding: 10px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            font-size: 13px;
        }

        .main-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: 0.3s; }
        .main-btn.active { background: var(--accent); color: #000; font-weight: bold; box-shadow: 0 0 15px var(--accent); }

        .upload-label { background: var(--accent); color: #000; padding: 12px; border-radius: 8px; font-weight: bold; display: block; cursor: pointer; margin-bottom: 10px; font-size: 14px; text-decoration: none; }
        
        canvas { display: block; margin: 15px auto; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); max-width: 98%; }

        /* ჩამრთველი (Toggle Switch) */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

<div class="header">
    <h1 class="neon-title">სმარტ ჟალუზი</h1>
    
    <label for="imgLoader" class="upload-label">📸 გადაიღე / ატვირთე ფანჯარა</label>
    <input type="file" id="imgLoader" accept="image/*" capture="environment" style="display:none;">

    <div class="controls-grid">
        <div class="switch-box">
            ჩვენება
            <label class="switch">
                <input type="checkbox" id="visibleCheck" checked onchange="draw()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="switch-box">
            ანიმაცია
            <label class="switch">
                <input type="checkbox" id="animCheck" onchange="toggleAnim()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div style="display: flex; gap: 5px; justify-content: center; margin-top: 10px;">
        <button class="main-btn active" onclick="setType('horizontal', this)">ჰორიზონტალური</button>
        <button class="main-btn" onclick="setType('vertical', this)">ვერტიკალური</button>
        <button class="main-btn" onclick="setType('zebra', this)">ზებრა</button>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let baseImg = new Image(), overlayImg = new Image();
    let pts = [{x: 60, y: 60}, {x: 240, y: 60}, {x: 240, y: 240}, {x: 60, y: 240}];
    let dragging = -1, type = 'horizontal';
    
    // ანიმაციის ცვლადები
    let animHeight = 1.0; // 1.0 = სრულად დაშვებული, 0.1 = აწეული
    let animDirection = -0.01;
    let animID = null;

    const svgs = {
        horizontal: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="white"/><path d="M0 5h100M0 10h100M0 15h100M0 20h100M0 25h100M0 30h100M0 35h100M0 40h100M0 45h100M0 50h100M0 55h100M0 60h100M0 65h100M0 70h100M0 75h100M0 80h100M0 85h100M0 90h100M0 95h100" stroke="black" stroke-width="0.5" opacity="0.3"/></svg>`,
        vertical: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="white"/><path d="M5 0v100M10 0v100M15 0v100M20 0v100M25 0v100M30 0v100M35 0v100M40 0v100M45 0v100M50 0v100M55 0v100M60 0v100M65 0v100M70 0v100M75 0v100M80 0v100M85 0v100M90 0v100M95 0v100" stroke="black" stroke-width="0.5" opacity="0.3"/></svg>`,
        zebra: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="10" fill="white"/><rect y="10" width="100" height="10" fill="#bbb"/><rect y="20" width="100" height="10" fill="white"/><rect y="30" width="100" height="10" fill="#bbb"/><rect y="40" width="100" height="10" fill="white"/><rect y="50" width="100" height="10" fill="#bbb"/><rect y="60" width="100" height="10" fill="white"/><rect y="70" width="100" height="10" fill="#bbb"/><rect y="80" width="100" height="10" fill="white"/><rect y="90" width="100" height="10" fill="#bbb"/></svg>`
    };

    function toggleAnim() {
        if (document.getElementById('animCheck').checked) {
            animate();
        } else {
            cancelAnimationFrame(animID);
            animHeight = 1.0;
            draw();
        }
    }

    function animate() {
        if (!document.getElementById('animCheck').checked) return;
        
        animHeight += animDirection;
        if (animHeight <= 0.1 || animHeight >= 1.0) animDirection *= -1;
        
        draw();
        animID = requestAnimationFrame(animate);
    }

    function setType(t, btn) {
        type = t;
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateOverlay();
    }

    function updateOverlay() {
        overlayImg.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svgs[type])));
        overlayImg.onload = draw;
    }

    document.getElementById('imgLoader').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            baseImg.onload = () => {
                const ratio = Math.min(window.innerWidth / baseImg.width, 400 / baseImg.height);
                canvas.width = baseImg.width * ratio; canvas.height = baseImg.height * ratio;
                const w = canvas.width, h = canvas.height;
                pts = [{x:w*0.2, y:h*0.2}, {x:w*0.8, y:h*0.2}, {x:w*0.8, y:h*0.8}, {x:w*0.2, y:h*0.8}];
                draw();
            }; baseImg.src = ev.target.result;
        }; reader.readAsDataURL(e.target.files[0]);
    };

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (baseImg.src) ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
        
        if (document.getElementById('visibleCheck').checked) {
            ctx.globalAlpha = 0.7;
            drawPerspective();
            ctx.globalAlpha = 1.0;
        }

        pts.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
            ctx.fillStyle = "white"; ctx.fill();
            ctx.strokeStyle = varAccent(); ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.arc(p.x, p.y, 25, 0, Math.PI*2);
            ctx.fillStyle = "rgba(56, 189, 248, 0.1)"; ctx.fill();
        });
    }

    function varAccent() { return "#38bdf8"; }

    function drawPerspective() {
        if (!overlayImg.complete) return;
        const pieces = 15; 
        for (let i = 0; i < pieces; i++) {
            // ანიმაციის ეფექტი: ვხატავთ მხოლოდ გარკვეულ სიმაღლემდე
            for (let j = 0; j < pieces * animHeight; j++) {
                const x1 = i / pieces, y1 = j / pieces;
                const x2 = (i + 1) / pieces, y2 = (j + 1) / pieces;

                const p1 = getLerp(x1, y1), p2 = getLerp(x2, y1);
                const p3 = getLerp(x2, y2), p4 = getLerp(x1, y2);

                ctx.save();
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y);
                ctx.closePath();
                ctx.clip();

                const sx = x1 * overlayImg.width, sy = y1 * overlayImg.height;
                const sw = (x2 - x1) * overlayImg.width, sh = (y2 - y1) * overlayImg.height;
                ctx.drawImage(overlayImg, sx, sy, sw, sh, p1.x, p1.y, 
                    Math.abs(p2.x-p1.x)+1, Math.abs(p4.y-p1.y)+1);
                ctx.restore();
            }
        }
    }

    function getLerp(tx, ty) {
        const topX = pts[0].x + (pts[1].x - pts[0].x) * tx;
        const topY = pts[0].y + (pts[1].y - pts[0].y) * tx;
        const botX = pts[3].x + (pts[2].x - pts[3].x) * tx;
        const botY = pts[3].y + (pts[2].y - pts[3].y) * tx;
        return {
            x: topX + (botX - topX) * ty,
            y: topY + (botY - topY) * ty
        };
    }

    function getMouse(e) {
        const rect = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: t.clientX - rect.left, y: t.clientY - rect.top };
    }

    canvas.addEventListener('mousedown', e => {
        const m = getMouse(e);
        pts.forEach((p, i) => { if (Math.hypot(p.x - m.x, p.y - m.y) < 40) dragging = i; });
    });
    canvas.addEventListener('touchstart', e => {
        const m = getMouse(e);
        pts.forEach((p, i) => { if (Math.hypot(p.x - m.x, p.y - m.y) < 40) dragging = i; });
        if(dragging !== -1) e.preventDefault();
    }, {passive: false});

    window.addEventListener('mousemove', e => {
        if (dragging === -1) return;
        pts[dragging] = getMouse(e); draw();
    });
    window.addEventListener('touchmove', e => {
        if (dragging === -1) return;
        pts[dragging] = getMouse(e); draw();
        e.preventDefault();
    }, {passive: false});

    window.addEventListener('mouseup', () => dragging = -1);
    window.addEventListener('touchend', () => dragging = -1);

    canvas.width = window.innerWidth * 0.95; canvas.height = 300;
    updateOverlay();
</script>
</body>
</html>
