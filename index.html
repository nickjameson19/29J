<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დიო - კონფიგურატორი</title>
    <style>
        :root { --accent: #38bdf8; --bg: #0f172a; --panel: rgba(30, 41, 59, 0.9); }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--panel); backdrop-filter: blur(10px); padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .neon-title { font-size: 18px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin: 0; letter-spacing: 2px; }
        .main-content { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        
        .canvas-area { flex: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.2); border-radius: 15px; position: relative; }
        canvas { max-width: 95%; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; cursor: crosshair; }

        .chat-panel { flex: 1; background: #1e293b; border-radius: 15px; display: flex; flex-direction: column; border: 1px solid var(--accent); overflow: hidden; }
        .chat-header { background: var(--accent); color: #000; padding: 10px; font-weight: 800; font-size: 13px; text-align: center; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .msg { padding: 10px 14px; border-radius: 12px; max-width: 85%; line-height: 1.5; }
        .msg.ai { background: rgba(56, 189, 248, 0.1); border-left: 3px solid var(--accent); align-self: flex-start; color: #f1f5f9; }
        .msg.user { background: var(--accent); color: #000; align-self: flex-end; font-weight: 600; }
        
        .chat-input-area { padding: 10px; background: rgba(0,0,0,0.4); display: flex; gap: 5px; }
        .chat-input { flex: 1; background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; outline: none; }
        .send-btn { background: var(--accent); border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .upload-label { background: var(--accent); color: #000; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
        @media (max-width: 768px) { .main-content { flex-direction: column; overflow-y: auto; } .chat-panel { height: 400px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 class="neon-title">DIO CONFIGURATOR</h2>
        <div style="margin-top:10px; display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:10px;">
            <label for="imgLoader" class="upload-label">📸 ატვირთე ფოტო</label>
            <input type="file" id="imgLoader" accept="image/*" style="display:none;">
            <select id="typeSelect" onchange="setType(this.value)" style="background:#1e293b; color:white; border:1px solid var(--accent); padding:5px; border-radius:5px;">
                <option value="horizontal">ჰორიზონტალური</option>
                <option value="vertical">ვერტიკალური</option>
                <option value="zebra">ზებრა</option>
                <option value="romuli">რომაული</option>
            </select>
            <span style="font-size:11px;">ანიმაცია: <input type="checkbox" id="animCheck" onchange="toggleAnim()"></span>
        </div>
    </div>

    <div class="main-content">
        <div class="canvas-area">
            <canvas id="canvas"></canvas>
        </div>

        <div class="chat-panel">
            <div class="chat-header">კონსულტაცია</div>
            <div class="chat-messages" id="chatMsgs">
                <div class="msg ai">მოგესალმებით, რით შემიძლია დაგეხმაროთ? მაქვს სრული ინფორმაცია პროდუქციის ზომებზე და მოვლის წესებზე.</div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" class="chat-input" placeholder="ჩაწერეთ კითხვა..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="send-btn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- ლოგიკური ცოდნის ბაზა ---
    const dioData = [
        {
            keys: ["ზომა", "ზომები", "რა ზომის", "მაქსიმალური", "მინიმალური", "სიგანე", "სიმაღლე"],
            text: "პროდუქციის ზომები ინდივიდუალურია: ჰორიზონტალური ჟალუზის სიგანე კეთდება 0.25მ-დან 3მ-მდე. ვერტიკალურის სიგანე 4 მეტრამდეა, ხოლო სიმაღლე - 5 მეტრამდე. ზებრა და როლეტი მაქსიმუმ 2.4 მეტრამდე სიგანისაა, ხოლო რომაული ფარდის რეკომენდებული სიგანე 2.5-3 მეტრია."
        },
        {
            keys: ["ფასი", "რა ღირს", "ღირებულება", "იაფი"],
            text: "ფასის დასაზუსტებლად გთხოვთ მიმართოთ კონსულტანტს, რადგან ღირებულება დამოკიდებულია ზუსტ ზომებზე, მასალის ფაქტურაზე და მექანიზმზე."
        },
        {
            keys: ["რომაული", "ფხრიწი", "რეცხვა", "გარეცხვა"],
            text: "რომაული ფარდა ძალიან მოსახერხებელია. ქსოვილი კარნიზზე სპეციალური წებოვანი ლენტით (ფხრიწით) მაგრდება, რაც საშუალებას გაძლევთ მარტივად მოხსნათ და გარეცხოთ."
        },
        {
            keys: ["მოვლა", "წმენდა", "გაწმენდა", "დასვრა"],
            text: "მოვლის წესები ასეთია: ვერტიკალური და ჰორიზონტალური ჟალუზები იწმინდება ნოტიო ჩვრით. ზებრა და როლეტი საჭიროებს მხოლოდ მშრალ წმენდას (რბილი ჯაგრისით ან მტვერსასრუტით), ხოლო რომაული ფარდა შეგიძლიათ გარეცხოთ."
        },
        {
            keys: ["ბავშვი", "უსაფრთხოება", "თოკი", "ჯაჭვი"],
            text: "უსაფრთხოება ჩვენთვის პრიორიტეტია. გირჩევთ, სამართავი ჯაჭვები და თოკები მოარიდოთ ბავშვებს. გვაქვს სპეციალური ფიქსატორები, რომლებიც უზრუნველყოფს უსაფრთხოებას."
        },
        {
            keys: ["მაგნოლია", "მინაზე"],
            text: "მაგნოლია მაგრდება უშუალოდ ფანჯრის ჩარჩოზე. ის მინიმალურ ადგილს იკავებს და ფანჯრის გადმოკიდებისას მყარად ფიქსირდება."
        }
    ];

    function getResponse(input) {
        input = input.toLowerCase();
        for (let item of dioData) {
            for (let key of item.keys) {
                if (input.includes(key)) return item.text;
            }
        }
        return "გთხოვთ დააზუსტოთ თქვენი კითხვა. შემიძლია მოგაწოდოთ ინფორმაცია ზომებზე, მოვლაზე ან პროდუქციის მახასიათებლებზე. ფასის დასადგენად კი უმჯობესია დაუკავშირდეთ კონსულტანტს.";
    }

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;
        addMsg(text, 'user');
        input.value = '';
        setTimeout(() => addMsg(getResponse(text), 'ai'), 500);
    }

    function addMsg(t, s) {
        const c = document.getElementById('chatMsgs');
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        c.appendChild(d);
        c.scrollTop = c.scrollHeight;
    }

    // --- მორგების ლოგიკა ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let baseImg = new Image();
    let pts = [{x: 50, y: 50}, {x: 250, y: 50}, {x: 250, y: 200}, {x: 50, y: 200}];
    let dragging = -1, type = 'horizontal', animH = 1, animID = null;

    function setType(t) { type = t; draw(); }
    function toggleAnim() { 
        if(document.getElementById('animCheck').checked) { 
            animID = setInterval(() => { animH -= 0.01; if(animH < 0.1) animH = 1; draw(); }, 50); 
        } else { clearInterval(animID); animH = 1; draw(); } 
    }

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        if(baseImg.src) ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.7;
        ctx.fillStyle = "#38bdf8";
        ctx.fillRect(pts[0].x, pts[0].y, (pts[1].x-pts[0].x), (pts[2].y-pts[1].y)*animH);
        ctx.globalAlpha = 1;
        pts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 6, 0, Math.PI*2); ctx.fillStyle="white"; ctx.fill(); ctx.strokeStyle="#38bdf8"; ctx.stroke(); });
    }

    document.getElementById('imgLoader').onchange = (e) => {
        const r = new FileReader();
        r.onload = (ev) => { baseImg.onload = () => { canvas.width = 400; canvas.height = 300; draw(); }; baseImg.src = ev.target.result; };
        r.readAsDataURL(e.target.files[0]);
    };

    canvas.addEventListener('mousedown', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        pts.forEach((p, i) => { if(Math.hypot(p.x-mx, p.y-my) < 30) dragging = i; });
    });
    window.addEventListener('mousemove', e => {
        if(dragging === -1) return;
        const rect = canvas.getBoundingClientRect();
        pts[dragging] = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        draw();
    });
    window.addEventListener('mouseup', () => dragging = -1);

    canvas.width = 400; canvas.height = 300; draw();
</script>
</body>
</html>
