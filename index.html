<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ჟალუზი - დიო</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background: #121212; color: white; margin: 0; padding: 10px; overflow: hidden; touch-action: none; }
        .controls { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .color-btn { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #fff; cursor: pointer; margin: 4px; display: inline-block; }
        canvas { background: #000; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); touch-action: none; cursor: crosshair; max-width: 100%; height: auto; }
        input[type="file"] { display: block; margin: 10px auto; color: #aaa; }
        h3 { margin: 5px 0; font-size: 18px; }
    </style>
</head>
<body>

<div class="controls">
    <h3>ჟალუზი</h3>
    <input type="file" id="imgLoader" accept="image/*">
    <div id="colors">
        <div class="color-btn" style="background: #ffffff" onclick="changeColor('#ffffff')"></div>
        <div class="color-btn" style="background: #f4e7d4" onclick="changeColor('#f4e7d4')"></div>
        <div class="color-btn" style="background: #d9c09a" onclick="changeColor('#d9c09a')"></div>
        <div class="color-btn" style="background: #8b5e3c" onclick="changeColor('#8b5e3c')"></div>
        <div class="color-btn" style="background: #333333" onclick="changeColor('#333333')"></div>
    </div>
</div>

<canvas id="canvas"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let baseImg = new Image(), overlayImg = new Image();
    let pts = [{x: 50, y: 50}, {x: 250, y: 50}, {x: 250, y: 250}, {x: 50, y: 250}];
    let dragging = -1, currentColor = '#ffffff';

    // ჟალუზის ფაილის სახელი (უნდა იდოს GitHub-ზე იმავე ადგილას)
    overlayImg.src = "jaluzi.png"; 
    overlayImg.onload = draw;

    document.getElementById('imgLoader').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => { 
            baseImg.onload = () => {
                // ეკრანზე მორგება
                const maxW = window.innerWidth - 20;
                const maxH = window.innerHeight - 200;
                let ratio = Math.min(maxW / baseImg.width, maxH / baseImg.height);
                
                canvas.width = baseImg.width * ratio;
                canvas.height = baseImg.height * ratio;
                
                // საწყისი წერტილების დასმა ფანჯრის შუაში
                pts = [
                    {x: canvas.width * 0.25, y: canvas.height * 0.25},
                    {x: canvas.width * 0.75, y: canvas.height * 0.25},
                    {x: canvas.width * 0.75, y: canvas.height * 0.75},
                    {x: canvas.width * 0.25, y: canvas.height * 0.75}
                ];
                draw(); 
            }; 
            baseImg.src = ev.target.result; 
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function changeColor(c) { currentColor = c; draw(); }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // ფონი
        if (baseImg.src) ctx.drawImage(baseImg, 0, 0, canvas.width, canvas.height);
        
        // ჟალუზი
        if (overlayImg.complete) {
            ctx.save();
            let minX = Math.min(pts[0].x, pts[3].x), minY = Math.min(pts[0].y, pts[1].y);
            let w = Math.max(pts[1].x, pts[2].x) - minX, h = Math.max(pts[2].y, pts[3].y) - minY;
            
            ctx.globalAlpha = 0.85;
            ctx.drawImage(overlayImg, minX, minY, w, h);
            ctx.globalCompositeOperation = 'multiply';
            ctx.fillStyle = currentColor;
            ctx.fillRect(minX, minY, w, h);
            ctx.restore();
        }

        // წერტილების ხატვა (უფრო დიდი, რომ თითი მოხვდეს)
        pts.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 18, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 0, 0, 0.7)";
            ctx.fill();
